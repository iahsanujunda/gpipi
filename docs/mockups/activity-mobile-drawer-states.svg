<svg xmlns="http://www.w3.org/2000/svg" width="900" height="780" viewBox="0 0 900 780" role="img" aria-labelledby="title description">
  <title id="title">Activity filter bottom drawer states on mobile</title>
  <desc id="description">Two mobile screens show the standard option selector and date picker as bottom drawers. Each drawer leaves a visible dimmed area above it that can be tapped to dismiss.</desc>

  <defs>
    <clipPath id="left-screen">
      <rect x="42" y="42" width="374" height="690" rx="38" />
    </clipPath>
    <clipPath id="right-screen">
      <rect x="484" y="42" width="374" height="690" rx="38" />
    </clipPath>
    <filter id="phone-shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#1D4E89" flood-opacity="0.18" />
    </filter>
    <filter id="sheet-shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="-5" stdDeviation="10" flood-color="#1D4E89" flood-opacity="0.14" />
    </filter>
  </defs>

  <rect width="900" height="780" fill="#E7F5F7" />
  <text x="229" y="26" fill="#1D4E89" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1.2">OPTION DRAWER</text>
  <text x="671" y="26" fill="#1D4E89" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1.2">DATE DRAWER</text>

  <rect x="34" y="32" width="390" height="710" rx="48" fill="#1D4E89" filter="url(#phone-shadow)" />
  <rect x="476" y="32" width="390" height="710" rx="48" fill="#1D4E89" filter="url(#phone-shadow)" />

  <g clip-path="url(#left-screen)" font-family="Inter, system-ui, -apple-system, sans-serif">
    <rect x="42" y="42" width="374" height="690" fill="#F4FAFB" />
    <rect x="42" y="42" width="374" height="32" fill="#FFFFFF" />
    <text x="61" y="63" fill="#1D4E89" font-size="11" font-weight="700">9:41</text>
    <rect x="42" y="74" width="374" height="55" fill="#FFFFFF" />
    <path d="M69 92 60 101l9 9M61 101h16" fill="none" stroke="#1D4E89" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="88" y="107" fill="#1D4E89" font-size="16" font-weight="700">Household Assistant</text>
    <line x1="42" y1="128.5" x2="416" y2="128.5" stroke="#C9E2E5" />

    <text x="60" y="170" fill="#1D4E89" font-size="28" font-weight="700">Activity</text>
    <text x="60" y="195" fill="#526966" font-size="13">Review household expenses recorded through Slack.</text>
    <rect x="60" y="218" width="338" height="174" rx="12" fill="#FFFFFF" stroke="#C9E2E5" />
    <text x="78" y="249" fill="#1D4E89" font-size="17" font-weight="700">Refine activity</text>
    <rect x="78" y="267" width="302" height="48" rx="10" fill="#FFFFFF" stroke="#C9E2E5" />
    <text x="90" y="284" fill="#526966" font-size="10" font-weight="650">CATEGORY</text>
    <text x="90" y="304" fill="#17312E" font-size="15">All categories</text>
    <rect x="78" y="327" width="145" height="47" rx="10" fill="#FFFFFF" stroke="#C9E2E5" />
    <rect x="235" y="327" width="145" height="47" rx="10" fill="#FFFFFF" stroke="#C9E2E5" />
    <text x="90" y="355" fill="#526966" font-size="12">From</text>
    <text x="247" y="355" fill="#526966" font-size="12">To</text>

    <rect x="42" y="42" width="374" height="690" fill="#1D4E89" opacity="0.30" />

    <g filter="url(#sheet-shadow)">
      <path d="M42 366q0-16 16-16h342q16 0 16 16v366H42Z" fill="#FFFFFF" />
      <rect x="211" y="359" width="36" height="4" rx="2" fill="#526966" opacity="0.5" />
      <text x="62" y="405" fill="#1D4E89" font-size="20" font-weight="700">Category</text>
      <path d="m376 384 18 18m0-18-18 18" fill="none" stroke="#526966" stroke-width="2.5" stroke-linecap="round" />
      <line x1="42" y1="425" x2="416" y2="425" stroke="#C9E2E5" />
      <rect x="42" y="426" width="374" height="56" fill="#DFF4F4" />
      <path d="m66 454 7 7 13-15" fill="none" stroke="#16679A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <text x="104" y="461" fill="#17312E" font-size="16">All categories</text>
      <text x="104" y="517" fill="#17312E" font-size="16">Eating Out</text>
      <text x="104" y="573" fill="#17312E" font-size="16">Monthly Groceries</text>
      <text x="104" y="629" fill="#17312E" font-size="16">Transport</text>
    </g>
  </g>

  <g clip-path="url(#right-screen)" font-family="Inter, system-ui, -apple-system, sans-serif">
    <rect x="484" y="42" width="374" height="690" fill="#F4FAFB" />
    <rect x="484" y="42" width="374" height="32" fill="#FFFFFF" />
    <text x="503" y="63" fill="#1D4E89" font-size="11" font-weight="700">9:41</text>
    <rect x="484" y="74" width="374" height="55" fill="#FFFFFF" />
    <path d="M511 92 502 101l9 9M503 101h16" fill="none" stroke="#1D4E89" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="530" y="107" fill="#1D4E89" font-size="16" font-weight="700">Household Assistant</text>
    <line x1="484" y1="128.5" x2="858" y2="128.5" stroke="#C9E2E5" />

    <text x="502" y="170" fill="#1D4E89" font-size="28" font-weight="700">Activity</text>
    <text x="502" y="195" fill="#526966" font-size="13">Review household expenses recorded through Slack.</text>
    <rect x="502" y="218" width="338" height="174" rx="12" fill="#FFFFFF" stroke="#C9E2E5" />
    <text x="520" y="249" fill="#1D4E89" font-size="17" font-weight="700">Refine activity</text>
    <rect x="520" y="267" width="302" height="48" rx="10" fill="#FFFFFF" stroke="#C9E2E5" />
    <text x="532" y="284" fill="#526966" font-size="10" font-weight="650">CATEGORY</text>
    <text x="532" y="304" fill="#17312E" font-size="15">All categories</text>
    <rect x="520" y="327" width="145" height="47" rx="10" fill="#FFFFFF" stroke="#C9E2E5" />
    <rect x="677" y="327" width="145" height="47" rx="10" fill="#FFFFFF" stroke="#C9E2E5" />
    <text x="532" y="355" fill="#17312E" font-size="12">24 Jul 2026</text>
    <text x="689" y="355" fill="#526966" font-size="12">To</text>

    <rect x="484" y="42" width="374" height="690" fill="#1D4E89" opacity="0.30" />

    <g filter="url(#sheet-shadow)">
      <path d="M484 228q0-16 16-16h342q16 0 16 16v504H484Z" fill="#FFFFFF" />
      <rect x="653" y="221" width="36" height="4" rx="2" fill="#526966" opacity="0.5" />
      <text x="504" y="267" fill="#1D4E89" font-size="20" font-weight="700">From</text>
      <path d="m818 246 18 18m0-18-18 18" fill="none" stroke="#526966" stroke-width="2.5" stroke-linecap="round" />

      <path d="m522 305-8 8 8 8" fill="none" stroke="#526966" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="671" y="317" fill="#17312E" font-size="16" font-weight="700" text-anchor="middle">July 2026</text>
      <path d="m820 305 8 8-8 8" fill="none" stroke="#526966" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

      <g fill="#526966" font-size="10" font-weight="700" text-anchor="middle">
        <text x="528" y="353">SUN</text><text x="576" y="353">MON</text><text x="624" y="353">TUE</text>
        <text x="672" y="353">WED</text><text x="720" y="353">THU</text><text x="768" y="353">FRI</text><text x="816" y="353">SAT</text>
      </g>
      <g fill="#17312E" font-size="13" text-anchor="middle">
        <text x="672" y="388">1</text><text x="720" y="388">2</text><text x="768" y="388">3</text><text x="816" y="388">4</text>
        <text x="528" y="432">5</text><text x="576" y="432">6</text><text x="624" y="432">7</text><text x="672" y="432">8</text><text x="720" y="432">9</text><text x="768" y="432">10</text><text x="816" y="432">11</text>
        <text x="528" y="476">12</text><text x="576" y="476">13</text><text x="624" y="476">14</text><text x="672" y="476">15</text><text x="720" y="476">16</text><text x="768" y="476">17</text><text x="816" y="476">18</text>
        <text x="528" y="520">19</text><text x="576" y="520">20</text><text x="624" y="520">21</text><text x="672" y="520">22</text><text x="720" y="520">23</text><text x="768" y="520" fill="#FFFFFF">24</text><text x="816" y="520">25</text>
        <text x="528" y="564">26</text><text x="576" y="564">27</text><text x="624" y="564">28</text><text x="672" y="564">29</text><text x="720" y="564">30</text><text x="768" y="564">31</text>
      </g>
      <circle cx="768" cy="515" r="20" fill="#16679A" />
      <text x="768" y="520" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">24</text>
      <text x="510" y="624" fill="#16679A" font-size="14" font-weight="700">Clear date</text>
    </g>
  </g>

  <rect x="180" y="48" width="98" height="20" rx="10" fill="#1D4E89" />
  <rect x="622" y="48" width="98" height="20" rx="10" fill="#1D4E89" />
  <text x="450" y="766" fill="#526966" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">A visible, tappable scrim remains above every mobile drawer.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="430" height="940" viewBox="0 0 430 940" role="img" aria-labelledby="title description">
  <title id="title">Household Assistant budget page on a mobile phone</title>
  <desc id="description">The authenticated default view has a sticky header with an icon-only control that returns to Slack, the Household Assistant app name, a Budgeting heading, and vertically stacked cards showing each category, description, period, and amount.</desc>

  <defs>
    <clipPath id="screen-clip">
      <rect x="28" y="18" width="374" height="904" rx="40" />
    </clipPath>
    <filter id="phone-shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1D4E89" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="430" height="940" fill="#E7F5F7" />
  <rect x="20" y="8" width="390" height="924" rx="50" fill="#1D4E89" filter="url(#phone-shadow)" />
  <rect x="28" y="18" width="374" height="904" rx="40" fill="#F4FAFB" />

  <g clip-path="url(#screen-clip)" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="28" y="18" width="374" height="904" fill="#F4FAFB" />

    <rect x="28" y="18" width="374" height="38" fill="#ffffff" />
    <text x="48" y="42" fill="#1D4E89" font-size="13" font-weight="700">9:41</text>
    <g fill="none" stroke="#1D4E89" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M348 38c4-5 9-5 13 0" />
      <path d="M351 41c2-3 5-3 7 0" />
      <circle cx="354.5" cy="44" r="1" fill="#1D4E89" stroke="none" />
      <rect x="370" y="33" width="18" height="10" rx="2" />
      <path d="M389 36v4" />
    </g>
    <rect x="372.5" y="35.5" width="12.5" height="5" rx="1" fill="#1D4E89" />

    <rect x="28" y="56" width="374" height="58" fill="#ffffff" />
    <rect x="36" y="63" width="44" height="44" rx="10" fill="#ffffff" />
    <path d="M59 75L49 85L59 95M50 85H68" fill="none" stroke="#1D4E89" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="88" y="91" fill="#1D4E89" font-size="17" font-weight="700" letter-spacing="-0.2">Household Assistant</text>
    <line x1="28" y1="113.5" x2="402" y2="113.5" stroke="#C9E2E5" />

    <text x="44" y="163" fill="#1D4E89" font-size="32" font-weight="720" letter-spacing="-0.8">Budgeting</text>

    <g>
      <rect x="44" y="198" width="342" height="140" rx="12" fill="#ffffff" stroke="#C9E2E5" />
      <text x="68" y="231" fill="#1D4E89" font-size="18" font-weight="700" letter-spacing="-0.2">Eating Out</text>
      <text x="68" y="260" fill="#526966" font-size="15">
        <tspan x="68" dy="0">Restaurants, cafes, ramen, izakaya,</tspan>
        <tspan x="68" dy="22">and takeout meals</tspan>
      </text>
      <rect x="68" y="297" width="70" height="26" rx="13" fill="#DFF4F4" />
      <text x="103" y="315" fill="#526966" font-size="11" font-weight="650" text-anchor="middle" letter-spacing="0.4">WEEKLY</text>
      <text x="362" y="317" fill="#1D4E89" font-size="18" font-weight="700" text-anchor="end">¥15,000</text>
    </g>

    <g>
      <rect x="44" y="362" width="342" height="140" rx="12" fill="#ffffff" stroke="#C9E2E5" />
      <text x="68" y="395" fill="#1D4E89" font-size="18" font-weight="700" letter-spacing="-0.2">Monthly Groceries</text>
      <text x="68" y="424" fill="#526966" font-size="15">
        <tspan x="68" dy="0">Supermarket runs and bulk household</tspan>
        <tspan x="68" dy="22">food shopping</tspan>
      </text>
      <rect x="68" y="461" width="82" height="26" rx="13" fill="#DFF4F4" />
      <text x="109" y="479" fill="#526966" font-size="11" font-weight="650" text-anchor="middle" letter-spacing="0.4">MONTHLY</text>
      <text x="362" y="481" fill="#1D4E89" font-size="18" font-weight="700" text-anchor="end">¥60,000</text>
    </g>

    <g>
      <rect x="44" y="526" width="342" height="140" rx="12" fill="#ffffff" stroke="#C9E2E5" />
      <text x="68" y="559" fill="#1D4E89" font-size="18" font-weight="700" letter-spacing="-0.2">Transport</text>
      <text x="68" y="588" fill="#526966" font-size="15">
        <tspan x="68" dy="0">Trains, buses, taxis, and IC card</tspan>
        <tspan x="68" dy="22">top-ups</tspan>
      </text>
      <rect x="68" y="625" width="82" height="26" rx="13" fill="#DFF4F4" />
      <text x="109" y="643" fill="#526966" font-size="11" font-weight="650" text-anchor="middle" letter-spacing="0.4">MONTHLY</text>
      <text x="362" y="645" fill="#1D4E89" font-size="18" font-weight="700" text-anchor="end">¥20,000</text>
    </g>

    <g>
      <rect x="44" y="690" width="342" height="140" rx="12" fill="#ffffff" stroke="#C9E2E5" />
      <text x="68" y="723" fill="#1D4E89" font-size="18" font-weight="700" letter-spacing="-0.2">Household</text>
      <text x="68" y="752" fill="#526966" font-size="15">
        <tspan x="68" dy="0">Daily goods, drugstore purchases,</tspan>
        <tspan x="68" dy="22">and home supplies</tspan>
      </text>
      <rect x="68" y="789" width="82" height="26" rx="13" fill="#DFF4F4" />
      <text x="109" y="807" fill="#526966" font-size="11" font-weight="650" text-anchor="middle" letter-spacing="0.4">MONTHLY</text>
      <text x="362" y="809" fill="#1D4E89" font-size="18" font-weight="700" text-anchor="end">¥20,000</text>
    </g>

    <rect x="28" y="886" width="374" height="36" fill="#F4FAFB" fill-opacity="0.96" />
    <rect x="159" y="905" width="112" height="5" rx="2.5" fill="#1D4E89" fill-opacity="0.72" />
  </g>

  <rect x="166" y="27" width="98" height="24" rx="12" fill="#1D4E89" />
</svg>

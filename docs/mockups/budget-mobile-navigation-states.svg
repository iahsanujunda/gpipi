<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="965" viewBox="0 0 1320 965" role="img" aria-labelledby="title description">
  <title id="title">Route-aware mobile launcher states</title>
  <desc id="description">Three mobile screens compare the stable resting launcher, the expanded Budgeting launcher with a visually separate Add budget line page action, and the expanded Activity launcher with navigation only.</desc>

  <defs>
    <clipPath id="screen-clip">
      <rect x="8" y="8" width="374" height="704" rx="40" />
    </clipPath>
    <filter id="phone-shadow" x="-20%" y="-10%" width="140%" height="135%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1D4E89" flood-opacity="0.18" />
    </filter>
    <filter id="control-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1D4E89" flood-opacity="0.22" />
    </filter>
    <style>
      text { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .board-label { fill: #1D4E89; font-size: 12px; font-weight: 750; letter-spacing: 1.6px; }
      .board-note { fill: #526966; font-size: 12px; }
      .heading { fill: #1D4E89; font-weight: 700; }
      .secondary { fill: #526966; }
    </style>

    <g id="phone-shell">
      <rect width="390" height="720" rx="48" fill="#1D4E89" filter="url(#phone-shadow)" />
      <rect x="8" y="8" width="374" height="704" rx="40" fill="#F4FAFB" />
      <g clip-path="url(#screen-clip)">
        <rect x="8" y="8" width="374" height="704" fill="#F4FAFB" />
        <rect x="8" y="8" width="374" height="32" fill="#FFFFFF" />
        <text x="27" y="29" fill="#1D4E89" font-size="11" font-weight="700">9:41</text>
        <g fill="none" stroke="#1D4E89" stroke-width="1.5" stroke-linecap="round">
          <path d="M329 25c4-5 9-5 13 0" />
          <path d="M332 28c2-3 5-3 7 0" />
          <rect x="350" y="20" width="18" height="10" rx="2" />
        </g>
        <rect x="352.5" y="22.5" width="12.5" height="5" rx="1" fill="#1D4E89" />
        <rect x="8" y="40" width="374" height="56" fill="#FFFFFF" />
        <path d="M35 58 26 68l9 10M27 68h17" fill="none" stroke="#1D4E89" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <text x="54" y="74" fill="#1D4E89" font-size="16" font-weight="700">Household Assistant</text>
        <line x1="8" y1="95.5" x2="382" y2="95.5" stroke="#C9E2E5" />
      </g>
      <rect x="146" y="14" width="98" height="20" rx="10" fill="#1D4E89" />
    </g>

    <g id="budget-content">
      <text x="24" y="137" class="heading" font-size="28">Budgeting</text>
      <text x="24" y="174" class="heading" font-size="15">Active budget lines</text>
      <text x="366" y="174" class="secondary" font-size="12" text-anchor="end">5 lines</text>
      <g>
        <rect x="24" y="190" width="342" height="112" rx="12" fill="#FFFFFF" stroke="#C9E2E5" />
        <text x="42" y="218" class="heading" font-size="17">Eating Out</text>
        <text x="42" y="241" class="secondary" font-size="12">Restaurants, cafes, and takeout</text>
        <rect x="42" y="257" width="58" height="24" rx="12" fill="#DFF4F4" />
        <text x="71" y="273" class="secondary" font-size="10" font-weight="700" text-anchor="middle">WEEKLY</text>
        <text x="348" y="274" class="heading" font-size="17" text-anchor="end">¥15,000</text>
      </g>
      <g>
        <rect x="24" y="316" width="342" height="112" rx="12" fill="#FFFFFF" stroke="#C9E2E5" />
        <text x="42" y="344" class="heading" font-size="17">Monthly Groceries</text>
        <text x="42" y="367" class="secondary" font-size="12">Supermarket and pantry spending</text>
        <rect x="42" y="383" width="66" height="24" rx="12" fill="#DFF4F4" />
        <text x="75" y="399" class="secondary" font-size="9.5" font-weight="700" text-anchor="middle">MONTHLY</text>
        <text x="348" y="400" class="heading" font-size="17" text-anchor="end">¥75,000</text>
      </g>
      <g>
        <rect x="24" y="442" width="342" height="112" rx="12" fill="#FFFFFF" stroke="#C9E2E5" />
        <text x="42" y="470" class="heading" font-size="17">Mortgage</text>
        <text x="42" y="493" class="secondary" font-size="12">Monthly home payment</text>
        <rect x="42" y="509" width="66" height="24" rx="12" fill="#DFF4F4" />
        <text x="75" y="525" class="secondary" font-size="9.5" font-weight="700" text-anchor="middle">MONTHLY</text>
        <text x="348" y="526" class="heading" font-size="17" text-anchor="end">¥120,000</text>
      </g>
    </g>

    <g id="activity-content">
      <text x="24" y="137" class="heading" font-size="28">Activity</text>
      <text x="24" y="174" class="heading" font-size="15">Recent expenses</text>
      <g>
        <rect x="24" y="190" width="342" height="82" rx="12" fill="#FFFFFF" stroke="#C9E2E5" />
        <circle cx="55" cy="231" r="18" fill="#DFF4F4" />
        <path d="M48 232h14M51 226h8M51 238h8" fill="none" stroke="#16679A" stroke-width="1.6" stroke-linecap="round" />
        <text x="84" y="220" class="heading" font-size="15">Ramen</text>
        <text x="84" y="242" class="secondary" font-size="11">Eating Out · Today</text>
        <text x="345" y="230" class="heading" font-size="15" text-anchor="end">¥1,500</text>
      </g>
      <g>
        <rect x="24" y="286" width="342" height="82" rx="12" fill="#FFFFFF" stroke="#C9E2E5" />
        <circle cx="55" cy="327" r="18" fill="#DFF4F4" />
        <path d="M48 328h14M51 322h8M51 334h8" fill="none" stroke="#16679A" stroke-width="1.6" stroke-linecap="round" />
        <text x="84" y="316" class="heading" font-size="15">Supermarket</text>
        <text x="84" y="338" class="secondary" font-size="11">Monthly Groceries · Yesterday</text>
        <text x="345" y="326" class="heading" font-size="15" text-anchor="end">¥6,420</text>
      </g>
    </g>

    <g id="brand-launcher">
      <circle cx="195" cy="674" r="27" fill="#16679A" filter="url(#control-shadow)" />
      <rect x="184" y="663" width="9" height="9" rx="2" fill="#3FC1C0" />
      <rect x="198" y="663" width="9" height="9" rx="2" fill="#FFFFFF" />
      <rect x="184" y="677" width="9" height="9" rx="2" fill="#FFFFFF" />
      <rect x="198" y="677" width="9" height="9" rx="2" fill="#3FC1C0" />
    </g>

    <g id="close-launcher">
      <circle cx="195" cy="674" r="27" fill="#16679A" filter="url(#control-shadow)" />
      <path d="m186 665 18 18m0-18-18 18" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" />
    </g>

    <g id="budget-nav-item">
      <rect x="85" y="0" width="220" height="46" rx="23" fill="#16679A" />
      <rect x="103" y="14" width="20" height="15" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.7" />
      <path d="M107 14v-3h12v3m-6 5v6" fill="none" stroke="#FFFFFF" stroke-width="1.7" stroke-linecap="round" />
      <text x="137" y="29" fill="#FFFFFF" font-size="15" font-weight="700">Budgets</text>
      <circle cx="281" cy="23" r="3.5" fill="#FFFFFF" />
    </g>

    <g id="budget-nav-link">
      <rect x="85" y="0" width="220" height="46" rx="23" fill="#FFFFFF" />
      <rect x="103" y="14" width="20" height="15" rx="3" fill="none" stroke="#16679A" stroke-width="1.7" />
      <path d="M107 14v-3h12v3m-6 5v6" fill="none" stroke="#16679A" stroke-width="1.7" stroke-linecap="round" />
      <text x="137" y="29" fill="#1D4E89" font-size="15" font-weight="650">Budgets</text>
    </g>

    <g id="activity-nav-item">
      <rect x="85" y="0" width="220" height="46" rx="23" fill="#16679A" />
      <path d="M104 10h18v25l-4-3-5 3-4-3-5 3zm5 8h8m-8 6h6" fill="none" stroke="#FFFFFF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <text x="137" y="29" fill="#FFFFFF" font-size="15" font-weight="700">Activity</text>
      <circle cx="281" cy="23" r="3.5" fill="#FFFFFF" />
    </g>

    <g id="activity-nav-link">
      <rect x="85" y="0" width="220" height="46" rx="23" fill="#FFFFFF" />
      <path d="M104 10h18v25l-4-3-5 3-4-3-5 3zm5 8h8m-8 6h6" fill="none" stroke="#16679A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <text x="137" y="29" fill="#1D4E89" font-size="15" font-weight="650">Activity</text>
    </g>
  </defs>

  <rect width="1320" height="965" fill="#E7F5F7" />
  <text x="48" y="50" fill="#1D4E89" font-size="28" font-weight="750">Route-aware launcher · contextual actions stay distinct from navigation</text>
  <text x="48" y="78" fill="#526966" font-size="14">The launcher keeps one identity. Its menu adds a page-specific button only where that action is relevant.</text>

  <text class="board-label" x="230" y="120" text-anchor="middle">01 · REST</text>
  <text class="board-note" x="230" y="140" text-anchor="middle">Stable brand launcher</text>
  <text class="board-label" x="660" y="120" text-anchor="middle">02 · BUDGETING MENU</text>
  <text class="board-note" x="660" y="140" text-anchor="middle">Page action + navigation</text>
  <text class="board-label" x="1090" y="120" text-anchor="middle">03 · ACTIVITY MENU</text>
  <text class="board-note" x="1090" y="140" text-anchor="middle">Navigation only</text>

  <g transform="translate(35 160)">
    <use href="#phone-shell" />
    <use href="#budget-content" />
    <use href="#brand-launcher" />
  </g>

  <g transform="translate(465 160)">
    <use href="#phone-shell" />
    <use href="#budget-content" />
    <rect x="8" y="96" width="374" height="616" fill="#1D4E89" fill-opacity="0.34" />
    <path d="M195 648V386" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="2" stroke-dasharray="4 8" />

    <g filter="url(#control-shadow)">
      <rect x="61" y="366" width="268" height="66" rx="14" fill="#FFFFFF" stroke="#3FC1C0" stroke-width="2" />
      <circle cx="94" cy="399" r="18" fill="#16679A" />
      <path d="M94 391v16m-8-8h16" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
      <text x="124" y="391" fill="#16679A" font-size="9.5" font-weight="750" letter-spacing="1">PAGE ACTION</text>
      <text x="124" y="414" fill="#1D4E89" font-size="16" font-weight="700">Add budget line</text>
    </g>

    <text x="85" y="462" fill="#FFFFFF" font-size="9.5" font-weight="750" letter-spacing="1.2">NAVIGATION</text>
    <line x1="170" y1="459" x2="305" y2="459" stroke="#FFFFFF" stroke-opacity="0.52" />
    <g filter="url(#control-shadow)">
      <use href="#budget-nav-item" y="476" />
      <use href="#activity-nav-link" y="532" />
    </g>
    <use href="#close-launcher" />
  </g>

  <g transform="translate(895 160)">
    <use href="#phone-shell" />
    <use href="#activity-content" />
    <rect x="8" y="96" width="374" height="616" fill="#1D4E89" fill-opacity="0.34" />
    <path d="M195 648V480" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="2" stroke-dasharray="4 8" />
    <text x="85" y="498" fill="#FFFFFF" font-size="9.5" font-weight="750" letter-spacing="1.2">NAVIGATION</text>
    <line x1="170" y1="495" x2="305" y2="495" stroke="#FFFFFF" stroke-opacity="0.52" />
    <g filter="url(#control-shadow)">
      <use href="#budget-nav-link" y="512" />
      <use href="#activity-nav-item" y="568" />
    </g>
    <use href="#close-launcher" />
  </g>

  <g>
    <rect x="48" y="912" width="1224" height="1" fill="#C9E2E5" />
    <circle cx="63" cy="939" r="8" fill="#3FC1C0" />
    <text x="80" y="943" fill="#526966" font-size="12">Page action is a button with a verb and group label; destinations remain links. Both groups use the established launcher animation.</text>
  </g>
</svg>

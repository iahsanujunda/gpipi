      .board-label { fill: #1D4E89; font-size: 13px; font-weight: 750; letter-spacing: 1.3px; }
      .heading { fill: #1D4E89; font-weight: 700; }
      .body { fill: #17312E; }
      .secondary { fill: #526966; }
      .eyebrow { fill: #526966; font-size: 9px; font-weight: 750; letter-spacing: 0.8px; }
      .money { fill: #1D4E89; font-weight: 700; }
    </style>


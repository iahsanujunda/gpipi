<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1740" viewBox="0 0 1320 1740" role="img" aria-labelledby="title description">
  <title id="title">Household Assistant spend versus cap view inventory</title>
  <desc id="description">A mobile-first decision board showing exact spend and remaining values with supporting utilization bars, over-cap and zero-cap treatments, partial loading and failure states, and a desktop table adaptation.</desc>

  <defs>
    <filter id="phone-shadow" x="-20%" y="-10%" width="140%" height="135%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1D4E89" flood-opacity="0.18" />
    </filter>
    <filter id="panel-shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1D4E89" flood-opacity="0.13" />
    </filter>
    <style>

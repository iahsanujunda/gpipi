  <rect width="1320" height="1740" fill="#E7F5F7" />
  <text x="48" y="54" fill="#1D4E89" font-size="30" font-weight="750">Budget utilization · exact amounts lead, progress supports</text>
  <text x="48" y="84" fill="#526966" font-size="15">Per-line windows stay independent. Never combine WEEKLY and MONTHLY caps into one household total.</text>


app {
    env = "PROD"
    env = ${?APP_ENV}
}

ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [
      me.gpipi.SerializationKt.configureSerialization
      me.gpipi.StatusPagesKt.configureStatusPages
      me.gpipi.config.DatabaseKt.configureDatabase
      me.gpipi.SecurityKt.configureSecurity
      me.gpipi.RoutingKt.configureRouting
    ]
  }
}

web {
    baseUrl = "http://localhost:5173"
    baseUrl = ${?WEB_BASE_URL}
}
cors {
    allowedOrigin = "localhost:5173"
    allowedOrigin = ${?CORS_ALLOWED_ORIGIN}
}

session {
    signKey = ${?SESSION_SIGN_KEY}
}

db {
    url      = "jdbc:postgresql://127.0.0.1:5432/postgres"  # local default
    url      = ${?DATABASE_URL}                             # prod/Render overrides
    user     = "postgres"
    user     = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 5
    maxPoolSize = ${?DB_MAX_POOL_SIZE}
}

openrouter {
    apiKey  = ${?OPENROUTER_API_KEY}
    model   = "deepseek/deepseek-v4-flash"
    model   = ${?OPENROUTER_MODEL}
}

slack {
    signingSecret = ${?SLACK_SIGNING_SECRET}
    botToken = ${?SLACK_BOT_OAUTH_TOKEN}
}
